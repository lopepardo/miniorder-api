services:
  nginx:
    image: nginx:stable-alpine
    ports:
      - "3000:80"
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: miniorder-api:local
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-miniorder}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-miniorder}
      DB_SSL: false
      DB_POOL_MAX: 5
      DB_POOL_MIN: 0
      DB_POOL_IDLE_TIMEOUT_MS: 30000
      DB_POOL_CONNECTION_TIMEOUT_MS: 2000
      DB_POOL_MAX_LIFETIME_SECONDS: 300
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    init: true
    restart: unless-stopped
    networks:
      - frontend
      - backend
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-miniorder}
      POSTGRES_DB: ${DB_NAME:-miniorder}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-miniorder} -d ${DB_NAME:-miniorder}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - backend

volumes:
  postgres_data:

networks:
  frontend:
  backend:
