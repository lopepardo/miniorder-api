info:
  name: Get orders
  type: http
  seq: 2

http:
  method: GET
  url: "{{local_base_url}}/orders?page=1&pageSize=100"
  params:
    - name: page
      value: "1"
      type: query
    - name: pageSize
      value: "100"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
